name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build, for example v2.1.0'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    name: Build Linux release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [[ "$TAG" != v*.*.* ]]; then
            echo "Release tags must look like v2.1.0; got $TAG" >&2
            exit 1
          fi

          if [[ "$PACKAGE_VERSION" != "$VERSION" ]]; then
            echo "package.json version ($PACKAGE_VERSION) does not match tag ($VERSION)" >&2
            exit 1
          fi

          if ! grep -Fq "## [$VERSION]" CHANGELOG.md; then
            echo "CHANGELOG.md is missing a section for $VERSION" >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepare release notes
        shell: bash
        run: |
          awk -v version="${{ steps.version.outputs.version }}" '
            index($0, "## [" version "]") == 1 { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md

          if ! grep -q '[^[:space:]]' release-notes.md; then
            echo "No release notes found for ${{ steps.version.outputs.version }}" >&2
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build renderer and Electron entrypoints
        run: npm run build

      - name: Package Linux artifacts
        run: npx electron-builder --linux AppImage deb --x64 --publish never

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skald-${{ steps.version.outputs.version }}-linux-x64
          path: |
            release/*.AppImage
            release/*.deb
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Skald ${{ steps.version.outputs.version }}
          body_path: release-notes.md
          files: |
            release/*.AppImage
            release/*.deb
