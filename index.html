<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'">
    <title>Skald</title>
    <style>
      /* Loading screen styles - shown before React loads */
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #f9fafb 0%, #f3f4f6 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease-out;
      }
      
      #loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }
      
      .loading-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }
      
      .loading-icon {
        width: 4rem;
        height: 4rem;
        border-radius: 1rem;
        background: linear-gradient(135deg, #f9fafb, rgba(255,255,255,0.06));
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.4);
      }
      
      .loading-icon svg {
        width: 2rem;
        height: 2rem;
        color: #4f46e5;
        animation: spin 2s linear infinite;
      }
      
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      .loading-text {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.875rem;
        font-weight: 500;
        color: #6b7280;
      }
      
      .loading-dots {
        display: flex;
        gap: 0.25rem;
      }
      
      .loading-dot {
        width: 0.375rem;
        height: 0.375rem;
        border-radius: 50%;
        background-color: #4f46e5;
        animation: bounce 0.8s ease-in-out infinite;
      }
      
      .loading-dot:nth-child(1) {
        animation-delay: 0s;
      }
      
      .loading-dot:nth-child(2) {
        animation-delay: 0.2s;
      }
      
      .loading-dot:nth-child(3) {
        animation-delay: 0.4s;
      }
      
      @keyframes bounce {
        0%, 100% {
          transform: translateY(0);
          opacity: 0.3;
        }
        50% {
          transform: translateY(-8px);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <!-- Loading screen - shown before React loads -->
    <div id="loading-screen">
      <div class="loading-content">
        <div class="loading-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
          </svg>
        </div>
        <div class="loading-text">
          <span>Loading</span>
          <div class="loading-dots">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
          </div>
        </div>
      </div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide loading screen when React mounts
      // Check periodically for React to mount
      function hideLoadingScreen() {
        const root = document.getElementById('root');
        const loadingScreen = document.getElementById('loading-screen');
        
        if (root && root.children.length > 0 && loadingScreen) {
          loadingScreen.classList.add('hidden');
          // Remove from DOM after fade out
          setTimeout(function() {
            loadingScreen.remove();
          }, 300);
          return true;
        }
        return false;
      }
      
      // Try immediately (in case React is already mounted)
      if (!hideLoadingScreen()) {
        // Otherwise check periodically
        const checkInterval = setInterval(function() {
          if (hideLoadingScreen()) {
            clearInterval(checkInterval);
          }
        }, 50);
        
        // Fallback: hide after 2 seconds max
        setTimeout(function() {
          clearInterval(checkInterval);
          hideLoadingScreen();
        }, 2000);
      }
    </script>
  </body>
</html>
